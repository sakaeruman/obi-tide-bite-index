# OBI v1 = 沖家室 食い時合指数 設定ファイル
# 場所: 山口県周防大島町 沖家室島
# 最寄り潮位観測地点: 徳山（s=0136、約30km）

site:
  name: "沖家室島"
  prefecture: "山口県"
  city: "周防大島町"
  # 33°55'N, 132°15'E
  lat: 33.9167
  lon: 132.25
  timezone: "Asia/Tokyo"

tide_station:
  # 気象庁潮位観測 徳山（実検証で確定: コードは "QA"。"TY" は富山）
  code: "QA"
  number: "0136"
  name: "徳山"
  distance_km_from_site: 30
  # v2で実装予定の進行波/定常波の位相補正（暫定ハードコード）
  phase_shift_hours: 1.5  # TODO v2: 進行波・定常波の同定後に実測ベースで調整

# OBI(t) = [ w1*f_v + w2*f_dh + w3*U + w4*B_twilight + w5*M_moon + w6*S_season ] * P_temp * P_pressure
# 設計仕様: 01_知識ベース/潮汐と食い時合の科学＋独自指数の仕様.md
weights:
  # v1（暫定）では潮流速 |v| が取れないため、dh/dt を主軸として代用
  # 本来の初期重みは w1=0.35, w2=0.15, w3=0.15, w4=0.15, w5=0.10, w6=0.10
  # v1では w1=0、w2'=0.50 に拡大
  w1_flow: 0.00          # 潮流速 |v|（v1未使用、v2で計上）
  w2_dh: 0.50            # dh/dt（潮位変化率、v1の主軸）
  w3_currentratio: 0.15  # 潮位差比 U
  w4_twilight: 0.15      # 薄明 B（朝夕マズメ）
  w5_moon: 0.10          # 月相 M
  w6_season: 0.10        # 季節係数 S

# 不採用（リサーチで否定）
disabled:
  solunar: true        # Solunor理論は採用しない
  tide_label: true     # 「大潮/中潮/小潮」ラベルは採用しない

# 補正係数（乗法）
# P_temp, P_pressure はv1ではプレースホルダ（1.0）。v2で気象API統合。
modifiers:
  p_temp_default: 1.0
  p_pressure_default: 1.0

# 対象魚種（v1）
target_species:
  - madai     # マダイ
  - aji       # アジ
  - tachiuo   # タチウオ
  - sawara    # サワラ

# 月別季節係数 S_season（魚種×月）
# 出典: 01_知識ベース/漁期×魚種カレンダー.md（v1仮説）
# 値域: 0.0-1.0（1.0=最盛期、0.5=可、0.3=時期外、0.7=好機）
season:
  madai:
    # マダイは産卵期（春＝4-5月）と秋（10-11月）が好機、夏冬は0.5
    1: 0.5
    2: 0.5
    3: 0.5
    4: 0.7
    5: 0.7
    6: 0.5
    7: 0.5
    8: 0.5
    9: 0.5
    10: 0.7
    11: 0.7
    12: 0.5
  aji:
    # アジ: 6月0.5、7-10月1.0（本番）、11月0.5、その他0.3
    1: 0.3
    2: 0.3
    3: 0.3
    4: 0.3
    5: 0.3
    6: 0.5
    7: 1.0
    8: 1.0
    9: 1.0
    10: 1.0
    11: 0.5
    12: 0.3
  tachiuo:
    # タチウオ: 4月0.5、5-8月0.7、9-10月1.0（盛期）、11月0.7、その他0.3
    1: 0.3
    2: 0.3
    3: 0.3
    4: 0.5
    5: 0.7
    6: 0.7
    7: 0.7
    8: 0.7
    9: 1.0
    10: 1.0
    11: 0.7
    12: 0.3
  sawara:
    # サワラ: 4-5月1.0（乗っ込み）、6-11月0.5、その他0.3
    1: 0.3
    2: 0.3
    3: 0.3
    4: 1.0
    5: 1.0
    6: 0.5
    7: 0.5
    8: 0.5
    9: 0.5
    10: 0.5
    11: 0.5
    12: 0.3

# 出力設定
output:
  dir: "out"
  filename_pattern: "obi_{date}.md"  # date=YYYYMMDD
  star_levels: 5  # ★5段階表記

# データ取得・キャッシュ
data:
  dir: "data"
  cache_days: 7  # 取得済み潮位データの保持日数

# ロギング
logging:
  dir: "logs"
  level: "INFO"
